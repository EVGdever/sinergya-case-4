<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator">
    <input id="first" type="text" placeholder="Первое число">
    <input id="second" type="text" placeholder="Второе число">
    <div class="buttons">
      <button id="sum">сумма</button>
      <button id="difference">разность</button>
      <button id="product">произведение</button>
      <button id="division">деление</button>
    </div>
    <div id="result" class="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
